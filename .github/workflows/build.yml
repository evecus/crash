name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          #cache: 'npm'
          #cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install frontend deps & build
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install gcc (for CGO/SQLite)
        run: sudo apt-get install -y gcc

      - name: Build backend (linux/amd64)
        run: |
          cd backend
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o ../crashpanel-linux-amd64 .

      - name: Build backend (linux/arm64)
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          cd backend
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 \
            CC=aarch64-linux-gnu-gcc \
            go build -ldflags="-s -w" -o ../crashpanel-linux-arm64 .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crashpanel-binaries
          path: |
            crashpanel-linux-amd64
            crashpanel-linux-arm64

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            crashpanel-linux-amd64
            crashpanel-linux-arm64
